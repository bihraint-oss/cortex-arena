name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - run: uv run pytest --cov=cortex_arena --cov-report=term-missing

  package:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync --extra dev --locked
      - run: uv build
      - run: uv run cortex-arena build-submission
      - run: uv venv .wheel-venv
      - run: uv pip install --python .wheel-venv/bin/python dist/*.whl
      - run: .wheel-venv/bin/cortex-arena doctor
      - run: .wheel-venv/bin/cortex-arena play --seed 42 --verbose 0 --output "${RUNNER_TEMP}/wheel-smoke.html"
