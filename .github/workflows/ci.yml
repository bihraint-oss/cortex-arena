name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --extra dev --locked
      - run: uv run ruff check .
      - run: uv run pytest --cov=cortex_arena --cov-report=term-missing

  package:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev --locked
      - run: uv build
      - run: uv run cortex-arena build-submission
      - run: uv venv .wheel-venv
      - run: uv pip install --python .wheel-venv/bin/python dist/cortex_arena-0.1.0-py3-none-any.whl
      - run: .wheel-venv/bin/cortex-arena doctor
      - run: .wheel-venv/bin/cortex-arena play --seed 42 --verbose 0 --output "${RUNNER_TEMP}/wheel-smoke.html"
