<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Cortex Arena</title>
  <desc id="desc">A hierarchical game agent navigating a glowing strategy grid</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081225"/>
      <stop offset="0.55" stop-color="#11183a"/>
      <stop offset="1" stop-color="#23133f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="node"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#38bdf8" flood-opacity="0.8"/></filter>
  </defs>
  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <circle cx="1010" cy="95" r="115" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="790" cy="365" r="130" fill="#0ea5e9" opacity="0.08" filter="url(#soft)"/>

  <g transform="translate(765 48) skewX(-10)" opacity="0.82">
    <g stroke="#6d7fa8" stroke-opacity="0.35" fill="none">
      <path d="M0 0H360M0 52H360M0 104H360M0 156H360M0 208H360M0 260H360M0 312H360"/>
      <path d="M0 0V312M60 0V312M120 0V312M180 0V312M240 0V312M300 0V312M360 0V312"/>
    </g>
    <path d="M28 280 L88 228 L150 230 L212 158 L273 106 L332 54" fill="none" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g filter="url(#node)">
      <circle cx="28" cy="280" r="9" fill="#38bdf8"/>
      <circle cx="88" cy="228" r="7" fill="#67e8f9"/>
      <circle cx="150" cy="230" r="7" fill="#67e8f9"/>
      <circle cx="212" cy="158" r="10" fill="#a78bfa"/>
      <circle cx="273" cy="106" r="7" fill="#c4b5fd"/>
      <circle cx="332" cy="54" r="13" fill="#f0abfc"/>
    </g>
    <g fill="#0f172a" stroke="#94a3b8" stroke-width="2">
      <path d="M70 48l12-18 12 18-12 18z"/>
      <path d="M250 266l12-18 12 18-12 18z"/>
      <path d="M308 206l12-18 12 18-12 18z"/>
    </g>
  </g>

  <g transform="translate(78 98)">
    <text x="0" y="0" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" letter-spacing="4">HIERARCHICAL GAME AGENT</text>
    <text x="0" y="88" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="76" font-weight="750" letter-spacing="-3">Cortex Arena</text>
    <rect x="0" y="116" width="570" height="3" rx="2" fill="url(#line)" opacity="0.9"/>
    <text x="0" y="164" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="23">Explore · Remember · Infer · Plan · Fight</text>
    <g transform="translate(0 205)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
      <rect width="166" height="40" rx="20" fill="#0ea5e9" opacity="0.18" stroke="#38bdf8" stroke-opacity="0.5"/>
      <text x="83" y="26" fill="#bae6fd" text-anchor="middle">FOG OF WAR</text>
      <rect x="180" width="166" height="40" rx="20" fill="#8b5cf6" opacity="0.18" stroke="#a78bfa" stroke-opacity="0.5"/>
      <text x="263" y="26" fill="#ddd6fe" text-anchor="middle">RISK-AWARE A*</text>
      <rect x="360" width="166" height="40" rx="20" fill="#d946ef" opacity="0.14" stroke="#e879f9" stroke-opacity="0.5"/>
      <text x="443" y="26" fill="#f5d0fe" text-anchor="middle">TEAM TACTICS</text>
    </g>
  </g>
</svg>
